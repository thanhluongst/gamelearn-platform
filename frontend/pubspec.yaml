name: gamelearn
description: Game-Based Learning Platform for K-12 Students
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  get_it: ^7.6.7

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.1
  socket_io_client: ^2.0.3+1

  # Storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  confetti: ^0.7.0
  audioplayers: ^6.0.0
  animations: ^2.0.11
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  badges: ^3.1.2

  # Firebase
  firebase_core: ^2.27.1
  firebase_messaging: ^14.7.20

  # Excel
  excel: ^4.0.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.0.2+1
  connectivity_plus: ^6.0.3
  image_picker: ^1.0.7
  file_picker: ^8.0.3
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - assets/fonts/

